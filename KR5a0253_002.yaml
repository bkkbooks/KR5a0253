body:
  text: 五福玄巢子林轅神鳳述九還七返無多事十二時中總一時投壺口訣圖金瓶投木箭氣穴引神歸心正形端者機籌養發揮珞琭子云崇釋則離宫守定學道則水府求玄此言格矣貴賤錬液投中正壺中日月長壽旁門多伎巧俱不免無常天先天後天釋氏牟尼含無極太極孔氏仲尼大無不包牟之與尼元細無不入一以貫之抱朴之潮風冰電性依命生圖馱伏濳飛理從道出百骸造端視聽以前萬化隨機杳冥恍惚靜功虛名論學道有五得仙次第考之曰夫欲修命者保見存以身爲丹房氣爲鉛汞隨陽功之動作外兼藥餌治身無病號曰人仙矧以玉符保神抱重厚純粹之質得象而忘言在世長年號爲地仙徒垣以疏交戚晦跡以免徴呼復以金液鍊形使形神俱妙得爲神仙濳藴造化樞機天道歸之若抱大患玄科禁戒復以言動爲忘而務廣修仁德暗積功行坐待氣足神完超清輕冲和之體以返洞天位證天仙以上四者既分品格適從修命之漸故其理之果必夫修性者信其無以氣爲主人身爲客寄抱陰氣以守靜並萬縁息百念雖飲啄不足累其心四大尸位五臟匏繫習衍坐功身無宿病不覺勞苦用工有效漸至靜定子精無漏則性水俱澄内觀無心外觀無形遠觀無物將入眞靜陽魂漸消陰魄漸勝魄之精性之水咸若光明靜定而能忘乃曰入定惟覺身在光中惚則無身性恣開朗是謂得性心純而博易中虚而言應淵兮預知人事吉凶悔吝察往知來本身有患却不自知覺或者陰脱神恐恐則群魔隊仗勉力智昏昏則蛇虎滿前若非有故則陰靈附其性虚邪入其體鬼神趨其役則亦服其勞靜功之驗比之抱一者亦曰人能常清靜天地悉皆歸陰精旺則尸魔旺似不自防墮深溺浚皆能自岀世所謂道高一尺魔高一丈是也或者棄身則敢以履險空想則不覺飢寒悍氣則飽食無糞忘形則不知痛痒尸厥則自伐無傷神妖則臨刑刃瓌息遯則煙爨不干性滅則全抛眠睡已上種種利益皆岀於指命捨死無有恐怖皆徒以駭觀惑耳去道尤遠謂之暫假因縁終不免於就死至於靜極而忽動不由主客而由賊邪動則莫能自禁發泄而形言歌詞章顯科教彰形化俗棄有着空或謗眞風是其失心所在好勝之心猶存非道使然雖名得道實無所得人生天地間抱萬古金天一泓神水胚胎男女俱足故性定則水澄澄則照物窪水清清即生魚鱉山有泉則有神涵則作妖魅俗聞妖術者入人家照其碗中之水尚可作盜竊況陰符性水也修行人得入空定境界夙有靈骨一心不昧自悟迴光返照復命歸根緘口以祀竈瞑目以過橋或可以移神上達出尸入殻去來無礙眞得鬼仙之道實證空王之果萬中有一亦爲難事雖曰了矣無米粥濟飢可否其或逐物意移異端並起以澄照化機鬼擘口語認爲己能則悮矣苟患失之禍將至矣孰謂没齒無怨言嗚呼惜哉天之道常善護物故無棄物鬼神無常情道敗則失之或曰鬼道易邪況復爲灾也常思鬼仙之成道也既不得游神於清輕又不能留形於重厚其居幽冥渺邈間意獨何似觀天地萬物之作先陰而後陽從無而生有先虚而後實捨妄而求眞先鬼而後神偃武而修文先功而後巧及粗而致精物其有也則日漸損廢壞拆貧散以至毁滅復歸於無形人與物俱隨氣運之流行躁勝寒靜勝熱弱勝强思勝恐天之道陰常勝陽人之道靜常勝動人稟陰質太重故言三魂七魄修仙道常自吉修鬼道常自凶易體之變亦曰與鬼神合其吉凶然世事文理亦是百件虚而一件實守動亦是道動極致靜靜則神凝守靜亦是道靜極復動動則氣散伏雌抱卵以水沃而試之浮而動者有生靜而僕者無生無生是無神此曉然之理也聖人觀復以傷物壞嘆曰莫若無物使不見其壞也卜筮書曰天地年月日時各有空亡而況於人乎常人死喪不過三年其于醫巫卜聖忠臣義士立功勳利濟而留名者有實行恩及後世則國人稱之故名在靈在其享則有祀雖忠靖義勇靈著陰部其餘慕清高狂簡而祠名者皆虚名在官則同禄殁亡亦同俗有祀而無享死喪歸無常與孤陰守靜者何異水調歌頭雷在地中復山下出泉蒙樞機合發時惟君子爲能通初九濳龍勿用上九亢龍有悔溟涬萃黄宫大畜有攸利善繼飬元雄剥鴻濛求鼎實作參同有孚盈缶油然道濟沛其豐酬酢噬金遯㲄鮒甕包承敝漏退食總由公納約自户牖其道永無窮悟得天仙訣參透祖師關坎離顛倒歸根復命片時間也不持齋受戒也不行藏語默也不坐禪圜因甚同門士廢寢更忘餐覓黄芽擒已汞結還丹塵情事冗般般應接道無干也莫去妻逐妾也莫抛兒棄女也莫說休官混飲太玄酒箇箇會乘鸞大藥金丹祖混質未分前剛柔剖判異名同出汞和鉛會得道窮物返鍊此華池神水推類合其玄二八正關鍵夫婦再團圓午臨申寅起子運周天爻符既濟陰須陽極始承權三五庚生甲滿漸以中孚孕有十月聖胎全表裏赫然赤洪造應純乾色象昆盧育具足辟支離大千人我總名無量阿僧祇男則給孤舍衛女則普門覺海愛慾受根基若樂蘭那行福報尚愆期善財施多寳積廣參師因縁殊勝頓超彼岸掬曹溪佛說須陀含果我得阿羅漢道如是證菩提第一波羅蜜諦聽可思惟樹老堪移接人老豈容枯玄元食母還丹入口是良圖乞得西家紅釀又覓東鄰白醖裝做一葫蘆就我鐺中煮玉兔搦金烏救衰翁伸老媪復如雛精填髓滿身心常是莊丁夫俗語神仙絶慾浪說眞人無念天也被機摸我道非常道定不自羈孤造物局浮僞天網艾如張提起死生關捩便是有閻王六道轉輪吞啗一氣循環貴賤校覈注生方苟免投皮鷇難遇好爺孃友多聞欺獲羅錯因忙天堂地獄信乎申吕鞠韓常耕餒寡尤寡悔道穀闕疑闕殆舉措巧承當要出陰陽構金鼎鍊鉛霜木金間隔體用之圖元氣生成之圖元氣說元氣始生猶一黍也露珠也水顆也蓋自無始曠劫霾翳搏聚之内含凝一點之水質也孕於其間如筐載卵自底而生斯有矣强名曰道曰靈寳承陰而生内白而外黑玄精建武北斗之經是也故内之白能化魄反屬陰外之黑能變魂反屬陽是陰含而陽抱也其内之陰因陽之動而隨出出則爲杳靄外之陽俟陰之靜而踐入入則肇氤孽陰氣始出視之不見是謂恍惚如同煙霧生寒氣也陽氣始入聽之不聞是謂杳冥乍若罔象生温氣也既合矣混質而成朴積小而爲大内非純陰外非純陽且陰氣之爲情好舒暢好緩散欲盡出既漸出矣復不捨其子則爲之胚暉狀若雲霧生濕氣也其陽氣之爲性好涵養好圓融欲盡入既漸入矣莫能離其母則爲之眹兆煦昕離合生熱氣也外陰愈搏内陽愈凝結成混沌其形如初乃立天象是玄包其黄者也且玄屬水也是元氣之至精積而盈也黄屬火也乃餘氣之生神烜而灼也猶是推之其混沌之内惟水中沉一日光者矣陰氣在天之外故不能靜則庣庣然常扇如母拍子眠陽氣在液之内故不能動則蠢蠢然常聽如雛候雉乳囮育兹乆黄之内生燥氣焉燥氣既生玄精蝕涸水涸氣虚因虚而風生焉燥極而雷作焉故天肫之内有四象焉其内也風欲揚而不能鼓水欲泆而不能决火欲炎而不能升雷欲蕩而不能發則漸相刑尅甚至戰爭風助水之力而作澎湃雷助火之力而加奮迅至於激搏而破矣破乃分之是開天也故雷震而闡風揚其曠火氣得以升沉水液得以流注古之運化者密措風雷爲盤古之號者欲使後世莫可輕測造化也天既分也元氣化氣之輕者自下而升結成梵宇也元氣積液之資重者隨底所載乃眞水也原其天自有象以來至於混沌未破之時大只百里也大率今時人一日可行百里路所以雷在其中惟能固養百里之聲震動十里之怒蓋火是其母也火之燃燎一日亦不過百里乃息是以知雷之與火之令有所執矣水可日流萬里風亦如之是以知水之與風之政無所拘矣故雷之擊物則有焦風之吹衣亦有濕各隨其母氣禀受之所有也百里之天既分則千里矣漸至萬里矣風隨方以展之雷逐位以蕩之外之餘氣施張以措之内之元氣兆運以局之歷元應化致令莫諦其幾千萬里矣或問風雷同穴也風可吹萬里雷只震百里何也曰風感寒氣而吹水是元氣則有餘也曰陰氣曰惡氣曰邪氣易積而難散陰神治世而多妄行也雷假燥氣而震火是餘氣則無私也曰陽氣曰怒氣曰義氣難動而易靜陽神治世而常守信也故雷展則聲微矣蕩則怒弱矣水火風雷四象也風惟魂雷惟響火惟光水獨質日乃火光也天宇之中有資而兆質者獨一水也水之上應北辰出焉而後水之氣日之影感化而生月矣然而水爲先天後天之母也水既生風風復吹水起浪爲沬雷復震水騰沸化萍日復曝水結滓成鹵月復照水澄坌作泥積泥而生融蝡俱化而爲土也風揚而塵日烈而砂湛露既降水滋之土始生苔蘚次有蓂蕪至於荏苒漸洳生滅土斯厚矣則草化爲竹條茂爲木乆之而草結穗木成樹卉梃實春榮秋剥俱腐化土土愈埤而地域場矣至于木根土壘盤礴交固乆之而化爲石則覆載之内有形而有象者惟木與石二物而矣老木受天地雲煙聚氣則有精有液乆之而化禽化龍化犴化男子神靈具足因夙以摧之則人物之四肢毛髮受之於木也乃能導躍鼓舞控拉屈伸是其情也赭石感水土日月孕秀則有血有乳乆之而化蟾化虎化羊化女人機源透徹因雷以驅之則人身之顱腹骨骼受之於石也乃能坐卧踞處懷躭守靜是其性也木男石女既有伉合孕生男女得以全身人物既有化育兹分人蟲匪媾亦繫胎胞長幼相須仍存子息種類差别形態庶焉蓐食郊野時性遂飛走火食墟聚慧辯醜妍原其木石生男女者無情化有情也石性有潤令人之更齒木性有枯令人之有死物類有形皆偏倚也惟人身爲最靈禀受陰陽元氣之全矣天神地祇皆人類主之復云天自開闢以來其象如一盎矣内之元氣化生諸氣升騰鬱結於盎唇聚爲穹廓猶釜底停煤之狀隨其下方升氣厚薄所集乆則垂懸隈磊得日月寒暑之氣陶鎔而成礦確内懷金玉之體或因穢濁氣干之而墮爲丘陵洞治女蝸氏之鍊石取其元氣以補天遺其質璞在世謂之五金珍寳其未經鍊鍛者乃丹砂鉛礬硝石衆類是也其穹窿聚氣既乆質璞累重亦稍下墜其上幻生崆峒則有虚空故萬物旦夕騰氣爲之仰托於諸氣焰熾之芒端炎赫無影之氣灼入空廓凝而曰神萬物之液氣混合於其下而爲星曰靈化生之氣應現而爲小星故小星曰宿以其能留光一夜也察天之道其初者無靈也含萬象之景内之流光以爲靈無神也拘萬物之氣表之炎赫以爲神其外無形其内無影至聖者不得睹其面惟賢者必可合其心或言天地之有瓌者此無他也蓋因二氣生化太過水力弱而土壤虚矣元氣是水也餘氣是土也水之晝夜常流洮汰川澤故河源常遷脉江岸無定垣是以禹基之栢系南北之榮枯錢塘之沙應東西之聚散日往月來世隨陵谷變遷水流極而勢弱矣況兼地土生物太盛土壤虚而不能自載小則隨方窪陷大則俱墜矣力因運窮數隨氣盡雖墜者墜必有底也但日月之光因震墜而激散無也地始墜也生氣絶而寒氣行也天無所載仍將危也其内冥冥然人物喪滅俱化土而無穢也已經人世三百六十年矣陰靜極而陽復動寒氣化而温氣生寒温相凑化而爲濕也濕氣既生薰蒸四達其穹窿寥廓因兹濡溽汗漫解斥亦皆崩榻也又經三百六十年矣猶廢窑受濕而摧也常觀山岡之勢一層石上又一層土重疊間積則可見天地之廢壞有自來矣夫天地之休息者是造化之歇力養氣也乃亦陰陽交接之道也歸根復命之義也雖曰有瓌只是餘氣生積成後天上穹下壤伏實歸土也其先天之天則無壞矣以其元氣常存還返而復生也至于濕氣盛而熱氣兆熱極乃燥陽氣至焉清濁分焉光明出焉物猶資始也又經九九八十一年矣故天地之一休息總得八百年嘗聞老人語開天一萬八百年然後有地猶此推之是天之積氣萬年而休息於八百年矣故總而言之也則又可見乾墮而成坤也故天一日有十二時人一身有十二經人之困醒惟在一時以合休息之數也天地既瓌也其神不滅也所以經云浮黎元始天尊與元始天尊相去幾劫仞信不誣矣崩墜之後天高而愈遠地卑而愈厚山有積而愈巍猶水落石出之義也天地不休息無從而開展也嬰孩不寢寐無從而變蒸也或問先天之天何能長存長生曰觀天之象如一盎矣外無夾曠傍無漏竅雖幽關淨土亦居其内之明晦偏靜處所其元氣之搬運與乎休息惟在其中是以長存也天包萬物以盜其氣而養之以是長生也夫天之盜物氣者天無二天惟盜於自己之内所生故萬物無損無違是其合得自然之盜也人亦能之況人有同體既可盜於自己之有也復能盜他物者哉奈何人之一身除五臟六腑之外别無物寄雖一飲一啄皆自外運而入欲求長生則難自生是以軒轅行御女之術故得一千二百歲籛鏗得育嬰之法亦享壽八百年歷觀移桃接杏插棃比桑至于採糜鹿之茸啖孽牲之肉身衣裘裳口需血食以其氣可補氣情可感情物殊而元氣同也先聖曰近取諸身遠取諸物世誦其言莫咬味也修道欲求得因求得而名盜食穀亦是盜食肉亦是盜欲爲食神之盜者雖盜而盜莫及苟能自盜元氣得以還返則長生之域易致知矣又尚可他圖而爲不仁之盜乎且曰人之元氣何物也其始也是無始氣中一點露珠也生天也生地也資於木石而生人也至及祖宗生身之父母也今之在人之身而有者乃兩腎中間一點神氣也自父母遺而有也夫天地陰陽萬物之交媾者媾精也訛云而有血也父母既降靈於關元育陽之穴即無始玄含露珠之本也是名元氣也其形恍惚其象杳冥隱於精液之内水體是也其主腎也含育陽魂而化生心氣心氣化生兩眼瞳人而分清濁右眼之清氣化神水還心爲液心之液化血還左腎爲精精化氣守神爲性左眼之濁氣上應生腦髓生頭顱既完而下生脊骨生右腎配左腎爲命門或繫女子胞合魂魄魂生肝生心生舌生膽生包絡生小腸生膀胱生垂莖魄生肺生喉嚨生胃生脾生攔腸生大腸生穀道營衛合而生三焦魂爲血行營生筋膂經絡魄化氣行衛生肌骨毛膚成身軀而後四肢也女人反皆是面北受胎也母悮言脉診也然則男女雖異皆以尺脉死生同斷命也夫元氣之經營者存乎腎過乎心應乎眼三宫升降一氣循環者也故腎與膀胱爲配心與小腸爲配眼與腦爲配其所配者是其都會之所也人知其配者是合也是歸也則知氣之出入有間隔也有衰旺也有清濁也此爲明心見性之候也其元氣之變態化爲氣液之二體也氣也者曰命也神也眞汞也隨動外接人之寤則神游於眼瞑則歸於心寐則逸於腎默則集於眉本此爲氣之升降者也液也者曰性也精也眞鉛也修靜内復在腎而爲精至肝而爲魂至心而爲血至脾而爲膏腴至心包絡而爲榮脉至肺而爲魄至三焦而爲衛氣至腠理而爲動氣至腦而爲神泉下至鼻中而爲玉漿至喉舌而爲靈液入于冑慕於心候營衛二氣周身既備亦還心會合水穀諸液於大腸至攔腸分泌清濁則清氣輸入小腸揍腎滲膀胱膀胱還元海元海再生氣晝夜之無端當此之際是謂神歸氣復氣與液合君子慎其獨得之爲小還男女混居室一物分二名陰中伏陽號曰黄芽陽内負陰象名白雪神符合而言之乃曰刀圭也修鍊之法於人身子陽之時沃以非凡之水進以自然之火自然即隨時之義也片餉功夫無中生有結成聖胎是謂奪造化也若又不求口訣而復失於同類玉液且無金液安有但以存想無爲望其交媾結丹誠爲虚妄也人無根本身在偏枯氣難停留液無歸着至于年老氣亦老形枯液亦枯身不了道則疾病是其憂飢渴是其累老死是其哀況爲陰陽殺機之奪算乎或問何謂奪也當其寒暑之時則傷人血脉脾冑濡弱當其雷電之時則攝人魂魄神驚去體當其陰雨之時則滅人精神夢吞陰氣當其霜雪之時則削人肌膚夢危泄精當其饑饉之時則萎人氣質頑臆臭惡當其瘟疫之時則腐人生命衄血夭壽當其兵戈之時則毁人形志大痛離散世人不知不覺而紅顏暗失憔悴此皆殺機之奪也有言天好生而惡殺者天莫不慈忍乎夫天之好生以地氣爲本物之生氣則養之物之死氣則敗之如人腹中不容臭腐也人能調服元氣必藉冑氣爲本捨粗糲而奉精粹違非時而食新鮮去陳餒而進甘㫖使胃氣充實則元氣有餘子曰祭於公不宿肉羌旅刲羊必先呪刃而剌或曰啖活肉棄死血昔時之所謡聞今日而果實見亦爲惜身重命知之損益故可近求道也苟或吊凶喪病患之家入産厭伏尸之次聞刑囚悲泣之聲坐屠殺流血之地自爲非法縲紲其身皆使人神駭散也殊不知元氣寄人之身如草棲煙善守者尚無百年主故養之則存觸之則散散則令人瞑眩甚則人仆矣人能養元氣之勇者身心洞燭胸臆篤實有念慮有惻隱有剛毅至於嘗大酖斷其臂刖其足元氣伏匿神色不移尚可活矣苟死者其靈亦不散也其不能養者庸陋淺識執迷退見多忌易惑氣無定守神無默處或因憂憤卒中暴亡或一喜一怒而輒喪身或傾生自殺此何愚之甚矣今謂元氣之所要也若曰元氣谷守之於内者曰正氣曰谷神曰性命餘氣施應之於外者曰浩氣曰應神曰聲色故王叔和診脉訣云若動應神魂魄在止便千休命不停所謂應神穴動是命脉存則人不死矣所以老子曰性命常存釋氏曰聲色皆空蓋一言其谷也一言其應者也世有迷徒不究奥理妄指釋氏欲得寂滅爲樂又豈知魯論云鳥之將死其鳴也哀人之將死其言也善之語爲悼哉噫前賢往哲有談道之無極者演易之太極者論天文地理者學藝射書數者推萬物盛衰者多是不從元氣立說至於窮理盡性正好下句處泛言常道既不爲己任𩩚依何厚薄筋骸相因束輳則皆與修身無益也於是孟軻但言善養浩然之氣莊周亦且怡悦應現之神全似不知元氣之眞一名曰道哉直論元氣者是一也一也者是三才共同此一立命之基也有物也有象也是人我之本來面目也萬法歸根而名之也歸源而復命亦一一之一也始於一也反復進退皆一也孰可二其名也故得指一歸元氣之說承師口訣有感五言四韻金液還丹訣無中養就兒一從師點透三嘆世難知守復神歸我交乾日用時逢人休問道一味服刀圭學鑄純陽劍庚金利用堅致柔仍歃汞剛折必加鉛過海没不没度關玄又玄仙人無忌憚縣佩去朝天道派分清濁訛傳理最淫藥材詢老嫩鑪鼎互陽陰龍虎知生處夫妻易死心紀丹十二載大藥一斤金混沌初分誕乾坤氣始青悦之非小道惜也惡其形兩曜旋期鼎五芽舍萬靈歲丹名在此經訣載黄庭了命須金鼎無神也有神遯庚潜向乙納甲媚逢辛外藥易亂性内丹難救貧遥聞唐吕子願度一千人谷神篇卷下

body:
  text: 谷神篇叙光九古聖帝王官天下者首以神仙之道默相傳授家天下者其道不傳是以至禹而止後遂散於方外之士皆口口相傳不立文字至周老氏著言五千其辭深古其㫖玄妙非神非聖孰能與哉禦寇莊周以為虛無蓋公曹參以為清靜雖非正義違道不遠其不幸者又有三焉申韓之徒引為慘酷寡恩刑名之謬一也北魏寇謙之嘗集道經為其書少遂將方技符水鑿藥卜筮識緯之書混而為一二也佛法未來方外之學則有二焉一曰神仙二曰道家仙即命也陽也道即性也陰也諸史藝文志所分二家雖有未當而判然不同明白矣其竅啓之士束於其教莫能甄别妄以孤陰身中指心腎為坎離鉛汞交媾金丹簧鼓愚下盲以引盲三也吁可勝歎哉蒙抱此憤憤二十餘年竟無可與言者近遇三山玄巢子林先生一言投機吻同針芥千載一時不勝慶幸先生復以三玄篇示蒙敬捧莊誦心駭目回念欲刊傳普惠學者奈其屢空獸難規措懇諗名公泊諸好事共成斯美照耀將來非無謂也昔旌陽真君明有玄記謂千載之後五陵之間當出地仙八百今殆其時矣是書也俾諸聞見者信心開悟誠俟真傳獲服龍虎之大丹直簉仙班以應玄記入長生久視之門豈不為大丈夫也哉凡我同人母自暴棄若延祐乙卯夏六月書于臨川濠上趙州趙思玄從善敬叙嘗聞修道而得仙參禪而作佛習儒而進仕蓋斯三事奇男子之大學者而患不能也夫道以理也醫以理也治亦以理也世無理字道何附以强名人有此生數難逃於老死有言修道者即是修身也鍊丹者即是鍊形也智者可以求益愚者徒自招損夫何故謂人之有身因受父母比怙一點之元陽假合形骸長成六尺之身軀原夫身者有所從出矣非干作意存想無中生有也人年十五之數如日月之朔望抱鉛汞之大有法爐鼎之象完過此以往則漸為虧吳況兼情欲冗擾精氣不免於衰耗未及中年臉疲毛落者良可歎矣是以上世仙真明明指論生身二氣為藥根本教人推類以加增益比氣以鉛延生此無他也即錮爐補罅之義矣是乃損益之道也世有愚夫福分淺薄不知身之可愛命之可惜全不存守身中本命元辰而反禱壽於木雕泥塑之像者所以不知道也徒然發忿下功或草衣木食忍飢受寒求道之無象則又勞形枯坐握固作氣亦無所得又且討論空法問辨鬥捷文章應對認為事業但圖打當口頭人事至於白首茫然皆是不求省悟甚至毁形滅性愈乖愈迷坐視生死紛紛人不可免苟意妄立無事邪說謂人之有身諸塵皆染為之妄有或言有生必有滅求生謂之偷生莫若寂滅以為大樂又言人之死也其陰魂謂之本來面目不生不滅不增不滅或言一靈湛然常住於虛空何處頓放前後悮穽其說者悔恨身為苦本莫能自棄至于燃頂斷臂毁截肢體捐身諸水火者惑為幻矣間有坐待衰老以盡天年者反遭耄邁之譏夫豈知人之死也魂魄悠於冥途風雨凄迷隨識受苦不聞征戰而亡者既死而無形矣尚求血食以妥其靈饑虛而亡者既死而無口矣尚求斛餅以慰其饑裸裎而亡者既死而無體矣尚求幣繒以掩其羞沉溺而亡者既死而無祿矣尚求角黍以繫其享癰疽而亡者既死而無背矣尚求草人以針其痛胎殰而亡者即死而無血矣尚求蘭盂以滌其穢及乎縊溺傷枉獄死路亡攝魂替代脫離苦趣智者詳之其寂滅之道安有樂乎人之有身也在生一日得一日之樂遲死一年增一年之智智識深遠而通神明若可待矣故俗云狐貍成精能學人語蟒蛇歲紀能作風雨檀柏年深始有香味蚌蛤固津而孕珍珠況人為靈物可不學道以求生乎身為靈樞可不鍊形以證仙乎夫道也者乃日用常言世俗之務也理至精微機懷動靜特為旁近取譬苟非正心誠意於學問者終鮮克知此道乃是吾腎君子之所可聞否乎仙經云失笑之道不足以語下士惟上智力能弘之可也余閩鄉林氏子也童卯之年厄於兵革家人構怨互相傾散欲治儒術之道莫可及也將皈釋氏之門慮孑遺也至于飄蓬四遠歷試諸難少從貧賤多能鄙事因觀黃帝內經若夙有得是以悴心於道疲身虛橐自放於湖海之上飢寒勞役順受萬有日矣幸遇至人憐憫指劃修真之要為了身第一藝也遂披閲群經參訪衆論若曰欲覓長生必由所生要見如來當究本來所生者元氣本來者精血人知根本功不浪施如飢渴得飲食如疾病投藥餌了悟真常堅固成道若以託空言逐邪見曰積後世因修來生福自把現在身心將為無用器物無修則無證終於落空也詳見丹經子書論還丹說大藥其最要法在乎神水華池為諸丹之基大道之祖存守則謂之寶珠交會則謂之金丹千家一理其詞章歌詠盍各言志以是用功精熟出言敷暢語皆神說愧余之未能也其火候斤兩之數亦在前賢道了不敢畫蛇添足伏念余濫聞至道未當發言但恐虛度歲月擬歸海島棲遁於巖竇之下作大休計也每思平昔交游星散於吳頭楚尾天涯海角者莫能遍辭故不得已搜攪乳腥之語以寄同志告諸往也因為是篇目之曰谷神不過谷養元氣而已雖俚文野語皆存造化儻有達事君輩幸而電覽默契心胸暗合道妙者稍見附文不協作意不工處慨垂斤削不亦可乎余傳之有師也派出韓逍遙之繼踵嗣蘆菴郁君之門弟子也其為人也凡聖混同隱顯莫測又兼余以卑微竊學素來多病尚慮福薄分淺須知由我由天未便脫塵離俗猶為曠己玷師是以未敢題其名也亦當為學肖者云耳昔大德八年甲辰歲一陽來復日五福玄巢子林轅神鳳叙

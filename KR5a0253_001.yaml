  text: 谷神篇卷上
  hash: sha256:e2064f5d470bc8b7c565de58a5fe4539f0dbd2e707ce193f52b28fe03510fc08
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0253_HFL_001-001a, image: hfl/0119/0119-132.png}
body:
  text: 五福玄巢子林轅神風述大藥還丹詩百歲光陰七十稀鬢斑齒缺使人悲如來先覺修無住元始常存執有為蘇晋談禪還慮死邵雍病篤尚求醫可憐愚輩參無字多少英雄著鬼迷聞道非師不决疑難求神水入華池未諳月窟擒鉛汞休向人前說坎離腐草化螢生滅易守株待兔覺移遲還丹未鍊頭顱白袖手傷心候死期調和鉛汞築丹基包括渾儀東就西會得木金須間隔定求庚甲兩相齊金公入贅青龍壻姹女俾承白虎妻依約黃婆媒合了杳冥之內産刀圭探得玄關路的端教君容易鍊還丹鑿開混沌分清濁滌盡塵囂現聖凡溫養自然金液暖烹煎立唤水銀乾分明一派西來意龍虎剛稱作兩般傳得仙翁如意瓢孜孜運水種靈苗溫泉洗淨蝦暮窟明月常盈鳥鵲橋木女藏庚奇宴會金童遁甲偶邀招恩情直欲濃交結同共乘鸞入九霄努力修真豈等間天涯海角覓師難每逢有道須求正莫學無言秖自瞞父母兩儀生胄子汞鉛二氣合還丹勸君著實尋玄牝身外求之總異端父精母血汞鉛根有質玄含元始尊辨别還丹知妙藥親疏大道與傍門乳為血宅猶宜啜氣是精藍急可吞抱一更修安樂法何憂性命不常存種食蟠桃竊化工朱顏常似醉春風布開鬼谷迷魂寨兜率人間極樂宫深慮伐柯潜守護老來摘實望無窮花開花落休攀折望遠從他爛熳紅修真初志望延年因道無傳浪入禪妄認眼光常顧盻便嫌皮袋不牢堅銷魂成魄絡為鬼鍊魄歸魂始是仙千古師家同一理教人尋覓水鄉鉛貧富修真仗宿因貧而修氣富修身氣靈脫體成陰鬼身固留形號谷神了命非鉛難繼富遇仙知藥轉愁貧修真有類須求配修氣無餘枉告人學仙因把死為讎立鼎安爐作大謀牢把鉢孟降水母無煩燈甕續閭丘九年抱道三千日一紀修丹十二秋要與骷髏爭餓氣打敖不喫土饅頭枯禪縳律事茫然離坎無從顛倒顛留命特求砂裏汞鍊形須藉水中鉛守丹氣候常如醉運火工夫最喜眠若泥坐圜齊了道死囚牢裏出神仙須彌輥芥海投針一失人身難再尋欲了觀音無盡意全憑亞聖有恆心補天鍊石騰青澒煮海為鹽證白金此理若還輕漏泄世情無古亦無今太一含靈化玉真舞衣元不染凡塵鉛花仙女垂光影金粟如來妙色身利物有功稱上善鍊形合道誄生神何尤竹帛朦朧載負殺堅心學道人紫府鵜膏軟碧香瓊房曲釀返魂漿兩停逆制為丹用一得盈持保命長啜摸羅㬋吞玉玦溫存月孛守珠囊黃庭鍊就金魚袋絶勝官封田舍郎絶學愚夫覺夢槐蟾光回照玉堂開招提月姊傾樽酌正值天童進饌來倒吊白蛇哇七曜橫騎黑虎上三台非天下之至神者熟敢輕言與此哉熟讀參同慕伯陽悟真復命更消詳離龍坎虎投爐鼎乾馬坤牛守洞房制汞單方言鶴草養鉛一味是紅娘陰陽配類身堅固巧謬非為不久長鑿破洪濛笑太虛手探黍米一玄珠猶龍剖此言無味餓虎吞之樂有雛學取仙翁調鼎鼐忍教君子遠庖厨度人粒粒超生死會得抽添滿玉壼大丹世莫得而聞閲遍神方費囑文搜邏華池求赤子抱歸紫府獻元君腹初受氣防飱泄腦漸凝神慮嚏分無盡玄機俱漏露勉人修道得惟勤多少修真不保真有心無志是愚人明知尺璧非吾寶鍊就黃金喪自身厚賂問姻充姪娣雕鞍躍馬勝麒麟動甘死地因驕易學道須當徹骨貧道釋經書每較銖摩尼如意玉驪珠蕭梁忿窒無由取漢武嬌奢不可圖彌勒杖頭椒布袋吕公條上藥葫蘆直須覓箇通梳漢盡底掀翻說向渠喬木羽人修果倉朝須金液暮瓊漿淘澄靈質如秋水凝結元神勝曉霜鬼火灼開飛鼠洞蠻雷鑿斷卧龍岡一從大藏黃庭路時駕羊車入翠房投老山林去學仙鍊丹燒藥保殘年兩弦艮兊鉛摶汞六合乾坤牝載玄土鬼伏雌成鳩卵金公懷蠱孕蛙涎百朝沐浴忙移鼎自白而黃十月全丹砂玉札類相投乾汞能容濕汞勾澆灌金花成寶樹烹煎玉液鑄瓊樓大千變化多靈聖得一分明萬事周若起利名心未足依前却向赤中求陰極陽生六脉充地雷震泮蘂珠宫初爻動處群爻動一法通時萬法通金鼎浴鉛修弱水玉爐進火忌為風異名同出無人識盡在玄關橐籥中未遇真詮豈在忙且須甘㫖助皮囊曉梳夜枕循天理夏葛冬裘閲世方肉食益神資療理人身幻體貴珍藏血精涕唾雖陰質得訣修持也壽長天涯求術種蟠桃雲夢陽平過幾遭摘得雷霆歸去種又包星斗出來淘權時納甲滋枯骨嫌殺勾庚說點茅黃道不修修黑道恢恢天網恐難逃求道須求罔象先休將龍虎亂言詮殺機反覆房中術嗜欲沉迷井底禪産穴迎紅蛇纏血舌尖送白野狐涎齎持金帛傳邪道悮了幾多羊肉錢三清科舉選鴻儒姦宄顛危道不扶天眼至仁能好惡世情移智及賢愚齎擎老子神仙璞傳授男兒大丈夫良馬匪嘉鞭影句玄關驟得入來無仙是人修孰不能后因從諫木從繩母勞泛海搜神藥容易當風續命燈求道西南傳得妙喪朋東北實何曾天真純雜細煩削玄酒一杯時曲肱理一真篇道之無名因一而立物之無形因一而生道區率性之源一繩繫命之蒂樂道而忘一者得其常名守一而行道者抱其淑質故一為萬數之始一為萬物之兆一為萬字之母是故道一具載體用兼明一為體而道為用性無生而命有生易曰乾為天矣坤為地矣谷為澤矣物為形矣道經却曰天得一以清地得一以寧谷得一以盈萬物得一以生人亦物也得一則生失一則死不可一日而無一也是知天之一地之一谷之一三者反復升降相生互為終始物雖有一自捨而不自得古者伏羲氏始畫八卦首書一畫為乾則曰剛健不已必有窮終復書一畫配之於是則兩乾成坤或曰折乾柔而為坤使剛柔相得動靜相安然後有定乾坤橐籥而成坎離坎離者乾坤之男女也坎離下變而生兊艮兊艮者坎離之男女也男女交會而成夫婦夫婦孕育而為父母父母再考而為翁婆此先天後天反復相生之義備矣治身者資一藝一術以贍其身修命者抱一陰一陽以全其神克家者歸一妻一妾以安其室此皆謂之得一故能身心有定老子抱一談道德五千言道要神功德符陰隲德之易傳者顔淵三月不違仁仁者義也德也可以傳其德道之難傳者洪範五福一曰富富者財也福也可以受其道人生天地間有守仁成德守富成福天賦不等也財囑卜而占乃靈義聽訟而獄縻决然則道不貴師德不貴資安得義學之事有成全而勝財學之也故難得之物必固執易聞之事絡退怠瘞幣以祀杜稷與貢賦同私設以蕆鬼神與受賂同古云道不虛傳世情猶其方士求術而不得者極則潜匿某書或竊比其樣乃已訪師問道至於絡身不傳者决無象可猜但自尤亦何怨或曰道非不傳亦非必用財傳雖謙尊君子聞道或侮也仙分多派正恐世絶此道苟得人而傳之是以道纍人泛鬻書者不敢附其文誣金者不可寄其物也向者吏輩速於達道妓媵多曾得仙故其識寵辱明巧拙善聞而忽悟設欺而不罔也今也世俗之學忘本以逐末失道而修德以萬為物數之至貴以一為物數之至賤聞無則訒聞有則哂道為一之蒙庇一為道之諱忌世多學士哄稱抱一守一了一得一虛名端的承當此一不起正如見方不重藥也所以一者不易於形言言之不足詠歌之不足嗟歎之不足也學道失此一之體用正所謂千金易得點水難消古之得道者是得一也其身能修上乘大成之道者游同玄域入衆妙門修其太玄之一廣布天罡正氣混元符水以濟世死或謂將有餘而補不足或曰調和汞鉛兩國無傷獨愚夫愚婦敗道亂真則妄相殘賊孝子失其道割股以救父母遂致父子俱斃焉知有一之不可獻耶經云道法三千六百門得其一者萬事畢故一乃玄關之總錀覺剎之都燈無關鍵而不開無幽遠而不照轅素手探玄中年悟道痛思鑕刺多難僥幸得於四方非勉力而不知非有失而不悟謹録以為普度火候行持絶句詩長生有訣不施工等得無常腳踏空說與汞鉛還失笑如何認得主人翁金精木液隔西東復姤移來土釜中率得五行歸一性鍊丹活計孰能同靈芽增長道根源花正開時月自圓此是五方降真氣一名真汞又名鉛日中有烏陰金赤月中有兔陽火白烏精兔血合成丹凡汞凡鉛燒不得日魂東卯卯屬兔月魄西酉酉屬雞鍊丹反本立基址但移雞兔還東西六壬姹女降瑶臺化作璇璣月孛雷悮觸黃房飛不去被鉛摶住結成胎鉛汞相投配四神鍊成靈質聖胎銀汞鉛以此為虛室繼體生龍骨氣真周天火候不難知葭管飛灰正子時只許黃婆能勘破女身月月有盈虧武陵溪口蟠桃熟玄曲山間火棗紅等待黑煙緋雨過摘來供養老仙翁人人有箇水銀壺老少殊途豈得無可惜擺拋全不顧尋常撒了定顏珠死心容易腎難降百日存精已是强夜飽天寒憂夢泄早求大藥點丹陽積精留氣豈因循元氣滋身百脉勻多少愚夫無福守敢將艾火暵臍輪採戰家風切莫行休言死户可求生少陰鼎內無窮寶未必英雄有志爭咸池窟宅水仙家一樹夭桃千度花多少喪身因採折悮他群妾衣緦麻老戀花叢覓少年道心爭似色心然兵行鬼道常危殆赤體衰翁抱虎眠古云好德如好色今日明朝終敗惑富兒相駕學採陰只許說得行不得吳娃越女富爭求解得春秋殺父讎臍暗乍開銅佛笑滿囊舍利一時休房中有術不如無鰥寡多聞婦尅夫早早驅儺貼身鬼勝如當户釘桃符會得神交體不交空花陽艷自能拋只堪托鉢降龍虎惹上身來沒下梢一滴蒙泉是藥材凡胎沐浴作靈胎歸根復命知關竅返本還元再有來晚歲參玄半醉醒陰符道德未能聽調羹既用鹽為主本命先由北斗經道從玄牝立丹基戊己宫中煅坎離不得真鉛製真汞誰家養得鬼胎兒混沌初生氣始青已坯丹藥在黃庭抽添容易韓湘子進退艱難仵達靈白雪黃芽受氣初除邪輔正號屠蘇少年坐道到頭白打破慳囊一滴無魁魒運動坎求離顛倒陰陽正及時唤醒了公添火候水源清濁恐差池一飲華池便有功鬢生新髮頂垂紅從容時把菱花照覺與尋常貌不同河車搬運氣難窮一轉工夫九載同抱道資身無影響學人妄想速成功日月周星逐序移審知法象妙能窺天非不老常搬運人志無常講片時男兒截白精化血女子斬赤血化精雖然未是蓬萊客也號嬰兒姹女名復命還元道氣存綿綿神水渥靈根老來顧戀閏中物百歲猶能種子孫三十時年血氣剛笑人談道說丹方厨中有米晨炊易燈裏無油夜作忙五十修丹已太遲氣衰身健號行尸幾人下志求爐鼎爐鼎而今又養兒現在有身須保有未來過去事歸無就他無有修無有論甚先天太極圖佛仙了命鉢囊中何事今人妄覺同僧不抱元非正果道修苦行即頑空習定為功已不才火升水降自狐精血榮氣衛循經絡安得刀圭入口來蓬萊有路仗神遊無字金丹未足修寂滅若能歸極樂骷髏自合嘆莊周泥著頑空錯到頭魂消魄散死皆休何人身上無龍虎却道身從纍劫修輪回生死事迷津佛化衆生積善因指示西方極樂國謂云種種得人身死户生門問要津佛言寂滅道言升空談似近玄談遠所以世人多敬僧年中求月日求時久在圜爐也不知寒夜相治喧坐鉢獨防精漏却歌詞癖性孤居倦博聞焉知守一尚傍門己身認作臭皮袋執定長生是妄言念經度厄說禳灾了義分明莫轉猜守道閉關行水火虎狼枷棒自何來五仙修道不同科天運回旋到爾何水德旺時陰直事玄門雖闡鬼功多道演三乘神鬼仙坐亡立脫命無傳停尸在地終名死咦咄喃喃說甚玄玉液嚴凝金液濃杜門修鍊絶人蹤守神不密精須漏夢接招徴妄作凶混元符水混元燈此是先天神氣精一自許君修鍊後到今舉世莫能行山間林下有愚夫名利甘心不去圖既道萬緣皆寂滅可堪歡笑待其無君相臣僚士庶賢惜精保命莫求天人生精髓非天與枉了燒香乞壽年日月高奔入紫庭工夫鬧裏亦堪行居官守道渾無閡只恐伊家行不清金丹返老再還童命穴求玄了性宗靴破若非皮片補吳綾蜀錦不彌縫人人身上有丹砂凡汞凡鉛莫可加未審庸夫何以見鬥燒雜石作黃芽守一精專死亦休忙如救渴飽難求縣胎要結波羅蜜捉箇蜂王放裏頭天癸天壬識得全終須有分做神仙任他紫府無名字畢竟吾能鍊汞鉛谷神篇卷上
